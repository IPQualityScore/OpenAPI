parameters:
  - $ref: ../components/parameters/apiKey.yaml
get:
  summary: List (XML)
  tags:
    - Bulk Validation CSV
  parameters:
    - name: type
      in: query
      required: false
      description: The type of CSVs to list
      schema:
        type: string
        enum:
          - proxy
          - email
          - url
          - phone
          - leaked_email
          - leaked_password
          - leaked_username
    - name: page
      in: query
      required: false
      description: The page number of results to return
      schema:
        type: integer
        minimum: 1
  responses:
    "200":
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Content-Type:
          schema:
            type: string
          example: text/xml;charset=UTF-8
      description: Success
      content:
        application/xml:
          schema:
            type: object
            properties:
              result:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                  csvs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        file_name:
                          type: string
                        type:
                          type: string
                        strictness:
                          type: integer
                        status:
                          type: string
                        aborted:
                          type: boolean
                        invalid_records:
                          type: integer
                        status_url:
                          type: string
                          format: uri
                  total_csvs:
                    type: integer
                  total_pages:
                    type: integer
                  page:
                    type: integer
                  request_id:
                    type: string
                  api_version:
                    type: integer
          example:
            result:
              message: Success
              success: true
              csvs:
                - id: 3398874
                  file_name: "email_2026-06-25 12:14:06"
                  type: email
                  strictness: 0
                  status: FINISHED
                  aborted: false
                  invalid_records: 1
                  status_url: https://www.ipqualityscore.com/api/xml/csv/cgHi6vaV3nosu1YeCCV01KwpQwT716It/status/3398874
                - id: 3398873
                  file_name: "email_2026-06-25 12:13:20"
                  type: email
                  strictness: 0
                  status: FINISHED
                  aborted: false
                  invalid_records: 1
                  status_url: https://www.ipqualityscore.com/api/xml/csv/cgHi6vaV3nosu1YeCCV01KwpQwT716It/status/3398873
              total_csvs: 2
              total_pages: 1
              page: 1
              request_id: ie6jj3lohy
              api_version: 1
