parameters:
  - $ref: ../components/parameters/apiKey.yaml
  - name: csvId
    in: path
    required: true
    description: The specific ID for your CSV
    schema:
      type: integer
get:
  summary: Status (XML)
  tags:
    - Bulk Validation CSV
  parameters: []
  responses:
    "200":
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Content-Type:
          schema:
            type: string
          example: text/xml;charset=UTF-8
      description: Success
      content:
        application/xml:
          schema:
            type: object
            properties:
              result:
                type: object
                properties:
                  message:
                    type: string
                  success:
                    type: boolean
                  id:
                    type: integer
                  file_name:
                    type: string
                  type:
                    type: string
                  strictness:
                    type: integer
                  status:
                    type: string
                  aborted:
                    type: boolean
                  invalid_records:
                    type: integer
                  downloads:
                    type: object
                    properties:
                      pristine:
                        nullable: true
                      clean:
                        nullable: true
                      bad:
                        type: string
                        format: uri
                      all:
                        type: string
                        format: uri
                  request_id:
                    type: string
                  api_version:
                    type: integer
